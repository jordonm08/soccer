<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Perfect</title>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131c;
    --surface2: #1c1c2a;
    --border:   #ffffff0f;
    --text:     #f0f0f5;
    --muted:    #6b6b80;
    --summit:   #4a8bef;
    --summit-dim:#1a2d4a;
    --stl:      #e03a3a;
    --stl-dim:  #3a1a1a;
    --green:    #34c97a;
    --gold:     #f5c842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── TOP BAR ────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
  }

  .topbar-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .app-title {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .app-title span { color: var(--gold); }

  .pill-count {
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--surface2);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    background: var(--surface2);
    color: var(--muted);
  }

  .tab.active        { background: var(--surface2); color: var(--text); outline: 1px solid #ffffff22; }
  .tab.active.t-all  { color: var(--text); }
  .tab.active.t-sum  { color: var(--summit); outline-color: var(--summit); }
  .tab.active.t-stl  { color: var(--stl);    outline-color: var(--stl); }
  .tab.active.t-home { color: var(--green);  outline-color: var(--green); }

  /* ── UPCOMING STRIP ─────────────────────────────── */
  .next-up {
    padding: 14px 20px 0;
    max-width: 680px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .next-cards {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .next-cards::-webkit-scrollbar { display: none; }

  .next-card {
    flex-shrink: 0;
    width: 180px;
    background: var(--surface);
    border-radius: 14px;
    padding: 14px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .next-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .next-card.summit::before { background: var(--summit); }
  .next-card.stlcity::before { background: var(--stl); }

  .next-card .nc-league {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .next-card.summit .nc-league  { color: var(--summit); }
  .next-card.stlcity .nc-league { color: var(--stl); }

  .next-card .nc-opp {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .next-card .nc-meta {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .next-card .nc-ha {
    display: inline-block;
    font-size: 0.58rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    margin-top: 8px;
  }

  .next-card .nc-ha.home { background: #0d3320; color: var(--green); }
  .next-card .nc-ha.away { background: #1e1e2a; color: var(--muted); }

  /* ── MAIN LIST ──────────────────────────────────── */
  .list {
    padding: 20px 12px 32px;
    max-width: 680px;
    margin: 0 auto;
  }

  .month-heading {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 6px 8px;
  }

  .row {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 12px;
    border-radius: 12px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    transition: background 0.12s;
    cursor: default;
  }

  .row:hover { background: var(--surface2); }

  .row.today {
    border-color: var(--gold);
    background: #1c1900;
  }

  .row.past { opacity: 0.35; }

  .row-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
  }

  .row.summit  .row-accent { background: var(--summit); }
  .row.stlcity .row-accent { background: var(--stl); }

  .date-col {
    text-align: center;
    line-height: 1;
  }

  .date-col .dn {
    font-size: 1.35rem;
    font-weight: 800;
    display: block;
  }

  .date-col .dd {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  .info-col {}

  .info-col .league-tag {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 2px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .summit  .dot { background: var(--summit); }
  .stlcity .dot { background: var(--stl); }

  .summit  .league-tag { color: var(--summit); }
  .stlcity .league-tag { color: var(--stl); }

  .info-col .matchup {
    font-size: 0.92rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .info-col .venue-line {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .today-badge {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 800;
    letter-spacing: 1px;
    background: var(--gold);
    color: #000;
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .meta-col {
    text-align: right;
    flex-shrink: 0;
  }

  .meta-col .time {
    font-size: 0.78rem;
    font-weight: 600;
    color: #bbb;
  }

  .ha-tag {
    display: inline-block;
    font-size: 0.58rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    margin-top: 5px;
    letter-spacing: 0.3px;
  }

  .ha-tag.home { background: #0d3320; color: var(--green); }
  .ha-tag.away { background: #1e1e1e; color: var(--muted); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .empty span { display: block; font-size: 2rem; margin-bottom: 10px; }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (min-width: 520px) {
    .info-col .matchup,
    .info-col .venue-line { max-width: 320px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row1">
    <div class="app-title">Pitch <span>Perfect</span></div>
    <div class="pill-count" id="count">— games</div>
  </div>
  <div class="tabs">
    <button class="tab active t-all"  onclick="setFilter('all')">All Games</button>
    <button class="tab t-sum"         onclick="setFilter('summit')">Denver Summit</button>
    <button class="tab t-stl"         onclick="setFilter('stlcity')">STL City</button>
    <button class="tab t-home"        onclick="setFilter('home')">Home Only</button>
  </div>
</div>

<div class="next-up" id="nextUpSection">
  <div class="section-label">Up Next</div>
  <div class="next-cards" id="nextCards"></div>
</div>

<div class="list" id="list"></div>

<script>
const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

function game(date, time, team, opp, home, venue) {
  const d = new Date(date + 'T00:00:00');
  return {
    date: d,
    dateKey: date,
    time,
    team,         // 'summit' | 'stlcity'
    opp,
    home,
    venue,
    isPast:   d < TODAY,
    isToday:  d.getTime() === TODAY.getTime(),
    dayNum:   d.getDate(),
    dayShort: d.toLocaleDateString('en-US', { weekday: 'short' }),
    monthFull:d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
    matchup:  (home ? 'vs ' : '@ ') + opp,
  };
}

// ── DENVER SUMMIT FC · 2026 NWSL ─────────────────────────────────────
const SUMMIT = [
  game('2026-03-14','4:30 PM MT',  'summit','Bay FC',               false,'PayPal Park · San Jose, CA'),
  game('2026-03-20','6:00 PM MT',  'summit','Orlando Pride',         false,'Inter&Co Stadium · Orlando, FL'),
  game('2026-03-25','5:30 PM MT',  'summit','Gotham FC',             false,'SI Stadium · Harrison, NJ'),
  game('2026-03-28','12:00 PM MT', 'summit','Washington Spirit',      true, 'Empower Field at Mile High'),
  game('2026-04-04','6:45 PM MT',  'summit','Seattle Reign',         false,'ONE Spokane Stadium'),
  game('2026-04-25','6:45 PM MT',  'summit','San Diego Wave FC',      true, "DICK'S Sporting Goods Park"),
  game('2026-05-03','1:00 PM MT',  'summit','Boston Legacy FC',      false,'Gillette Stadium · Foxborough, MA'),
  game('2026-05-16','6:45 PM MT',  'summit','Orlando Pride',          true, "DICK'S Sporting Goods Park"),
  game('2026-07-03','7:30 PM MT',  'summit','Kansas City Current',    true, 'Centennial Stadium'),
  game('2026-07-12','5:00 PM MT',  'summit','Houston Dash',           true, 'Centennial Stadium'),
  game('2026-07-18','12:00 PM MT', 'summit','Portland Thorns',        true, 'Centennial Stadium'),
  game('2026-08-02','7:00 PM MT',  'summit','Boston Legacy FC',       true, 'Centennial Stadium'),
  game('2026-08-05','8:00 PM MT',  'summit','North Carolina Courage', true, 'Centennial Stadium'),
  game('2026-08-08','2:00 PM MT',  'summit','Utah Royals',            true, 'Centennial Stadium'),
  game('2026-08-14','7:00 PM MT',  'summit','San Diego Wave FC',     false,'Snapdragon Stadium · San Diego, CA'),
  game('2026-09-19','6:45 PM MT',  'summit','Seattle Reign FC',       true, 'Centennial Stadium'),
  game('2026-09-26','11:30 AM MT', 'summit','Kansas City Current',   false,'CPKC Stadium · Kansas City'),
  game('2026-10-04','3:00 PM MT',  'summit','Chicago Stars',         false,'Northwestern Medicine Field'),
  game('2026-10-17','6:45 PM MT',  'summit','Angel City FC',          true, 'Centennial Stadium'),
  game('2026-10-24','4:30 PM MT',  'summit','Racing Louisville FC',   true, 'Centennial Stadium'),
  game('2026-11-01','5:00 PM MT',  'summit','North Carolina Courage', false,'First Horizon Stadium · Cary, NC'),
];

// ── STL CITY SC · 2026 MLS ───────────────────────────────────────────
const STL = [
  game('2026-02-21','1:30 PM CT',  'stlcity','Charlotte FC',          true, 'Energizer Park · St. Louis'),
  game('2026-03-01','3:00 PM CT',  'stlcity','San Diego FC',          false,'Snapdragon Stadium · San Diego'),
  game('2026-03-08','4:00 PM CT',  'stlcity','Seattle Sounders',      false,'Lumen Field · Seattle'),
  game('2026-03-14','7:00 PM CT',  'stlcity','LAFC',                  false,'BMO Stadium · Los Angeles'),
  game('2026-03-21','7:30 PM CT',  'stlcity','New England Revolution', true, 'Energizer Park · St. Louis'),
  game('2026-03-28','7:00 PM CT',  'stlcity','NYCFC',                 false,'Yankee Stadium · New York'),
  game('2026-04-04','7:30 PM CT',  'stlcity','FC Dallas',             false,'Toyota Stadium · Frisco, TX'),
  game('2026-04-11','8:00 PM CT',  'stlcity','Seattle Sounders',      false,'Lumen Field · Seattle'),
  game('2026-04-18','7:30 PM CT',  'stlcity','Inter Miami CF',         true, 'Energizer Park · St. Louis'),
  game('2026-04-25','7:30 PM CT',  'stlcity','Sporting KC',            true, 'Energizer Park · St. Louis'),
  game('2026-05-02','7:30 PM CT',  'stlcity','Austin FC',              true, 'Energizer Park · St. Louis'),
  game('2026-05-09','7:30 PM CT',  'stlcity','Colorado Rapids',       false,"DICK'S Sporting Goods Park"),
  game('2026-05-16','7:30 PM CT',  'stlcity','CF Montréal',            true, 'Energizer Park · St. Louis'),
  game('2026-05-23','7:30 PM CT',  'stlcity','Austin FC',              true, 'Energizer Park · St. Louis'),
  game('2026-07-16','7:30 PM CT',  'stlcity','Sporting KC',            true, 'Energizer Park · St. Louis'),
  game('2026-07-25','7:30 PM CT',  'stlcity','Atlanta United',         true, 'Energizer Park · St. Louis'),
  game('2026-08-01','7:30 PM CT',  'stlcity','New York Red Bulls',    false,'Red Bull Arena · Harrison, NJ'),
  game('2026-08-08','7:30 PM CT',  'stlcity','Columbus Crew',          true, 'Energizer Park · St. Louis'),
  game('2026-08-15','7:30 PM CT',  'stlcity','Portland Timbers',       true, 'Energizer Park · St. Louis'),
  game('2026-08-22','7:30 PM CT',  'stlcity','LA Galaxy',             false,'Dignity Health Sports Park · Carson, CA'),
  game('2026-08-29','7:30 PM CT',  'stlcity','FC Cincinnati',          true, 'Energizer Park · St. Louis'),
  game('2026-09-12','7:30 PM CT',  'stlcity','Nashville SC',          false,'GEODIS Park · Nashville'),
  game('2026-09-19','7:30 PM CT',  'stlcity','Minnesota United',       true, 'Energizer Park · St. Louis'),
  game('2026-09-26','7:30 PM CT',  'stlcity','Chicago Fire',          false,'Wrigley Field · Chicago'),
  game('2026-10-03','7:30 PM CT',  'stlcity','Houston Dynamo',         true, 'Energizer Park · St. Louis'),
  game('2026-10-10','7:30 PM CT',  'stlcity','Vancouver Whitecaps',   false,'BC Place · Vancouver'),
  game('2026-10-17','7:30 PM CT',  'stlcity','San Jose Earthquakes',   true, 'Energizer Park · St. Louis'),
];

const ALL = [...SUMMIT, ...STL].sort((a,b) => a.date - b.date);

let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const map = { all:'t-all', summit:'t-sum', stlcity:'t-stl', home:'t-home' };
  document.querySelector('.' + map[f]).classList.add('active');
  render();
}

function filtered() {
  if (currentFilter === 'all')     return ALL;
  if (currentFilter === 'home')    return ALL.filter(g => g.home);
  return ALL.filter(g => g.team === currentFilter);
}

function leagueLabel(team) {
  return team === 'summit' ? 'NWSL · Summit' : 'MLS · STL City';
}

function renderNextUp(games) {
  const upcoming = games.filter(g => !g.isPast).slice(0, 5);
  const section = document.getElementById('nextUpSection');
  const cards   = document.getElementById('nextCards');

  if (upcoming.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';

  cards.innerHTML = upcoming.map(g => `
    <div class="next-card ${g.team}">
      <div class="nc-league">${leagueLabel(g.team)}</div>
      <div class="nc-opp">${g.matchup}</div>
      <div class="nc-meta">
        ${g.dayShort}, ${g.date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}<br>
        ${g.time}
      </div>
      <span class="nc-ha ${g.home ? 'home' : 'away'}">${g.home ? 'Home' : 'Away'}</span>
    </div>
  `).join('');
}

function render() {
  const games = filtered();
  document.getElementById('count').textContent = games.length + ' games';

  renderNextUp(games);

  const list = document.getElementById('list');

  if (games.length === 0) {
    list.innerHTML = '<div class="empty"><span>⚽</span>No games match this filter.</div>';
    return;
  }

  // Group by month
  const groups = {};
  for (const g of games) {
    if (!groups[g.monthFull]) groups[g.monthFull] = [];
    groups[g.monthFull].push(g);
  }

  list.innerHTML = Object.entries(groups).map(([month, gs]) => `
    <div class="month-heading">${month}</div>
    ${gs.map(g => `
      <div class="row ${g.team}${g.isPast ? ' past' : ''}${g.isToday ? ' today' : ''}">
        <div class="row-accent"></div>
        <div class="date-col">
          <span class="dn">${g.dayNum}</span>
          <span class="dd">${g.dayShort}</span>
        </div>
        <div class="info-col">
          <div class="league-tag"><span class="dot"></span>${leagueLabel(g.team)}</div>
          <div class="matchup">${g.matchup}</div>
          <div class="venue-line">${g.venue}</div>
          ${g.isToday ? '<span class="today-badge">TODAY</span>' : ''}
        </div>
        <div class="meta-col">
          <div class="time">${g.time}</div>
          <span class="ha-tag ${g.home ? 'home' : 'away'}">${g.home ? 'Home' : 'Away'}</span>
        </div>
      </div>
    `).join('')}
  `).join('');
}

render();
</script>
</body>
</html>
